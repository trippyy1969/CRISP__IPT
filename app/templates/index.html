<!DOCTYPE html>
<html>
<head>
    <title>Interview Scheduler</title>
</head>

<body>

<h1>Campus Recruitment Scheduler</h1>

<form
    action="/generate"
    method="POST"
    enctype="multipart/form-data"
>

    <p>Students CSV</p>

    <input
        type="file"
        name="students_file"
        required
    >

    <br><br>

    <p>Companies CSV</p>

    <input
        type="file"
        name="companies_file"
        required
    >

    <br><br>

    <button type="submit">
        Generate Schedule
    </button>

</form>

</body>
</html>
