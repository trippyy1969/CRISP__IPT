<!DOCTYPE html>
<html>

<head>

    <title>
        Campus Recruitment Scheduler
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="container">

    <div class="header">

        <h1>
            Campus Recruitment Scheduler
        </h1>

        <br>

        <span class="badge">
            Upload Interview Data
        </span>

    </div>

    <div class="section">

        <h2 class="section-title">
            Upload CSV Files
        </h2>

        <form
            action="/generate"
            method="POST"
            enctype="multipart/form-data"
        >

            <p>
                Students CSV
            </p>

            <input
                type="file"
                name="students_file"
                required
            >

            <br><br>

            <p>
                Companies CSV
            </p>

            <input
                type="file"
                name="companies_file"
                required
            >

            <br><br>

            <button
                type="submit"
                class="action-btn"
            >
                Generate Schedule
            </button>

        </form>

    </div>

</div>

</body>

</html>
